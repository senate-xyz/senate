version: 2.1
orbs:
  node: circleci/node@5.0.3
  browser-tools: circleci/browser-tools@1.4.0

commands:
  build-command:
    steps:
      - run:
          name: Build
          command: yarn build
          no_output_timeout: 30m

  test-command:
    steps:
      - run:
          name: Test
          command: yarn test:web
          no_output_timeout: 30m

  store-results-command:
    steps:
      - store_artifacts:
          path: /home/circleci/project/apps/web/tests/e2e/screenshots/
      - store_artifacts:
          path: /home/circleci/project/apps/web/tests/e2e/videos/

jobs:
  synpress-e2e-job:
    machine: # executor type
      image: ubuntu-2004:current
    steps:
      - checkout

      - browser-tools/install-chrome:
          replace-existing: true
          chrome-version: 108.0.5359.71

      - run:
          command: |
            google-chrome --version

      - node/install:
          install-yarn: true
          node-version: "18.12"

      - node/install-packages:
          pkg-manager: yarn

      - build-command
      - test-command
      - store-results-command

workflows:
  synpress-e2e:
    jobs:
      - synpress-e2e-job
